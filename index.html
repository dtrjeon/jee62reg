<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>JUST EE 62기 전도폭발 모니터링</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Bebas+Neue&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;background:#f0f3f8;color:#1a1f2e}
input,button,select{font-family:'Noto Sans KR',sans-serif}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:2px}
</style>
</head>
<body>
<div id="root"></div>
<script>
"use strict";
const {createElement:h,useState,useRef,useEffect,useCallback,Fragment} = React;

// ══════════════════════════════════════════
//  ▼ GAS 배포 URL 입력 (유일하게 수정할 곳)
// ══════════════════════════════════════════
const GAS_URL = "https://script.google.com/macros/s/AKfycbxQ5GfT8jOIDTdoTfGs9EWdfUXdsdBoKH5l-R9ENSXooLeuWhhvef8kehpgHwaXVmeq2g/exec";

// ── 상수 ──────────────────────────────────
const CLASS_KEYS   = ["수지주일반","분당주일반","수지화요반"];
const CLASS_COLOR  = {"수지주일반":"#1a3ab0","분당주일반":"#2e7d32","수지화요반":"#c62828"};
const CLASS_BG     = {"수지주일반":"#e8eeff","분당주일반":"#e8f5e9","수지화요반":"#fdecea"};
const STAGE_ORDER  = ["1단계","2단계","3단계","4단계","5단계"];
const STAGE_COLORS = {"1단계":"#a78bfa","2단계":"#4ade80","3단계":"#60a5fa","4단계":"#f59e0b","5단계":"#f87171"};

function parseTs(ts){
  if(!ts)return new Date(0);
  const m=ts.match(/(\d{4})\. (\d+)\. (\d+) (오전|오후) (\d+):(\d+)/);
  if(!m)return new Date(0);
  let[,y,mo,d,ampm,hh,min]=m; hh=parseInt(hh);
  if(ampm==="오후"&&hh<12)hh+=12; if(ampm==="오전"&&hh===12)hh=0;
  return new Date(y,mo-1,d,hh,min);
}
function exDistrict(raw){
  if(!raw||raw==="없음"||raw==="-")return "미분류";
  const m=raw.match(/([가-힣]+\d*지구)/);
  return m?m[1]:(raw.split(" ")[0]||"미분류");
}

// ── 공통 스타일 헬퍼 ──────────────────────
const sec  = {background:"#fff",borderRadius:10,marginBottom:10,overflow:"hidden",boxShadow:"0 2px 12px rgba(26,58,176,0.06)"};
const card = {background:"#fff",borderRadius:10,marginBottom:6,boxShadow:"0 2px 8px rgba(26,58,176,0.07)",border:"1px solid rgba(26,58,176,0.1)",overflow:"hidden",cursor:"pointer"};
const secT = (color) => ({padding:"10px 14px",background:"#f0f4ff",fontSize:11,fontWeight:700,color,letterSpacing:0.8,borderBottom:"1px solid rgba(26,58,176,0.1)"});

// ══════════════════════════════════════════
//  Toast
// ══════════════════════════════════════════
function Toast({msg}){
  if(!msg)return null;
  return h("div",{style:{position:"fixed",bottom:70,left:"50%",transform:"translateX(-50%)",
    background:"rgba(26,42,108,0.95)",color:"#fff",padding:"9px 22px",borderRadius:20,
    fontSize:12,zIndex:600,whiteSpace:"nowrap",pointerEvents:"none"}},msg);
}

// ══════════════════════════════════════════
//  Detail Bottom Sheet
// ══════════════════════════════════════════
function DetailSheet({member,onClose}){
  const ref=useRef(null),sy=useRef(0);
  useEffect(()=>{
    const el=ref.current; if(!el)return;
    const ts=e=>{sy.current=e.touches[0].clientY};
    const te=e=>{if(e.changedTouches[0].clientY-sy.current>80)onClose()};
    el.addEventListener("touchstart",ts,{passive:true});
    el.addEventListener("touchend",te,{passive:true});
    return()=>{el.removeEventListener("touchstart",ts);el.removeEventListener("touchend",te)};
  },[]);
  if(!member)return null;
  const sc=STAGE_COLORS[member.stage]||"#94a3b8";
  const rows=[
    {k:"영문명",v:member.en},{k:"단계",v:member.stage,color:sc},
    {k:"직분",v:member.pos},{k:"성별",v:member.gender},
    {k:"생년월일",v:member.dob},{k:"연락처",v:member.phone},
    {k:"신청일시",v:member.timestamp,full:true},
    {k:"주소",v:member.address,full:true},
    {k:"소속 목장",v:member.district,full:true},
  ];
  return h("div",{
    style:{position:"fixed",inset:0,background:"rgba(10,15,40,0.55)",zIndex:400,display:"flex",alignItems:"flex-end",justifyContent:"center"},
    onClick:e=>{if(e.target===e.currentTarget)onClose()}
  },
    h("div",{ref,style:{background:"#fff",borderRadius:"16px 16px 0 0",width:"100%",maxWidth:600,maxHeight:"88vh",overflowY:"auto",paddingBottom:20}},
      h("div",{style:{width:36,height:4,background:"rgba(0,0,20,0.12)",borderRadius:2,margin:"12px auto 14px"}}),
      h("div",{style:{padding:"0 20px 12px",borderBottom:"1px solid #e5e7eb"}},
        h("div",{style:{fontSize:20,fontWeight:700}},member.name),
        h("div",{style:{display:"flex",gap:8,marginTop:6,flexWrap:"wrap"}},
          h("span",{style:{background:sc+"22",color:sc,fontSize:12,fontWeight:700,padding:"3px 10px",borderRadius:6}},member.stage),
          h("span",{style:{background:"#f0f4ff",color:"#1a3ab0",fontSize:12,fontWeight:600,padding:"3px 10px",borderRadius:6}},member.pos)
        )
      ),
      h("div",{style:{padding:"14px 20px"}},
        h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}},
          rows.map(r=>h("div",{key:r.k,style:{background:"#f7f9ff",borderRadius:8,padding:"8px 12px",border:"1px solid #e5e7eb",gridColumn:r.full?"1/-1":"auto"}},
            h("div",{style:{fontSize:9,color:"#94a3b8",fontWeight:700,letterSpacing:0.5,marginBottom:2}},r.k),
            h("div",{style:{fontSize:12,color:r.color||"#1a1f2e",fontWeight:500,wordBreak:"break-all"}},r.v||h("em",{style:{color:"#94a3b8",fontSize:11}},"미입력"))
          ))
        )
      ),
      h("button",{onClick:onClose,style:{display:"block",width:"calc(100% - 40px)",margin:"0 20px",padding:13,background:"linear-gradient(135deg,#2a5cd8,#1a3ab0)",border:"none",borderRadius:8,color:"#fff",fontSize:13,fontWeight:700,cursor:"pointer"}},"닫기")
    )
  );
}

// ══════════════════════════════════════════
//  로그인 화면
// ══════════════════════════════════════════
function LoginScreen({onLogin}){
  const [name,setName]=useState(""), [phone,setPhone]=useState(""),
        [err,setErr]=useState(""),   [show,setShow]=useState(false),
        [loading,setLoading]=useState(false);

  const go=async()=>{
    if(!name.trim()){setErr("이름을 입력해주세요.");return}
    if(!phone.trim()){setErr("전화번호 뒷 4자리를 입력해주세요.");return}
    setLoading(true); setErr("");
    try{
      const res=await fetch(`${GAS_URL}?action=login&name=${encodeURIComponent(name.trim())}&phone=${encodeURIComponent(phone.trim())}`);
      const data=await res.json();
      if(!data.ok){setErr(data.error||"로그인 실패");return}
      onLogin({name:data.name,role:data.role,classKey:data.classKey});
    }catch(e){
      setErr("서버 연결 실패. GAS URL을 확인해주세요.");
    }finally{setLoading(false)}
  };

  const inp={width:"100%",padding:"12px 14px",border:"2px solid rgba(26,58,176,0.12)",borderRadius:8,fontSize:15,outline:"none",background:"#f7f9ff",boxSizing:"border-box"};

  return h("div",{style:{position:"fixed",inset:0,background:"linear-gradient(160deg,#1a2a6c,#1a3ab0)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:999,padding:24}},
    h("div",{style:{background:"#fff",borderRadius:16,padding:"32px 28px",width:"100%",maxWidth:340,boxShadow:"0 8px 40px rgba(0,0,30,0.3)",textAlign:"center"}},
      h("div",{style:{fontSize:36,marginBottom:10}},"🙏"),
      h("div",{style:{fontFamily:"'Bebas Neue',sans-serif",fontSize:22,letterSpacing:2,color:"#1a3ab0",marginBottom:4}},"JUST EE 제62기"),
      h("div",{style:{fontSize:12,color:"rgba(40,50,80,0.55)",marginBottom:22}},"전도폭발 훈련 관리자 전용"),
      h("div",{style:{fontSize:11,fontWeight:700,color:"#1a3ab0",marginBottom:6,textAlign:"left"}},"이름"),
      h("input",{value:name,onChange:e=>setName(e.target.value),onKeyDown:e=>e.key==="Enter"&&go(),placeholder:"이름을 입력하세요",style:{...inp,marginBottom:12}}),
      h("div",{style:{fontSize:11,fontWeight:700,color:"#1a3ab0",marginBottom:6,textAlign:"left"}},"전화번호 뒷 4자리"),
      h("div",{style:{position:"relative",marginBottom:10}},
        h("input",{value:phone,onChange:e=>setPhone(e.target.value),onKeyDown:e=>e.key==="Enter"&&go(),
          type:show?"text":"password",placeholder:"뒷 4자리",inputMode:"numeric",maxLength:4,
          style:{...inp,paddingRight:40,letterSpacing:2}}),
        h("span",{onClick:()=>setShow(p=>!p),style:{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",cursor:"pointer",fontSize:18,color:"rgba(32,80,200,0.4)"}},show?"🙈":"👁")
      ),
      h("button",{onClick:go,disabled:loading,style:{width:"100%",padding:13,background:loading?"#8899cc":"linear-gradient(135deg,#2a5cd8,#1a3ab0)",border:"none",borderRadius:8,color:"#fff",fontSize:14,fontWeight:700,cursor:loading?"not-allowed":"pointer",marginTop:4,display:"flex",alignItems:"center",justifyContent:"center",gap:6}},
        loading&&h("span",{style:{animation:"spin 0.8s linear infinite",display:"inline-block"}},"↻"),
        loading?"인증 중...":"로그인"
      ),
      err&&h("div",{style:{fontSize:12,color:"#c62828",marginTop:10,fontWeight:600}},err)
    )
  );
}

// ══════════════════════════════════════════
//  전체 탭 — 3개 반 × 단계별 현황
// ══════════════════════════════════════════
function OverallPanel({classData}){
  const totalAll=CLASS_KEYS.reduce((s,k)=>s+(classData[k]?.members?.length||0),0);

  return h("div",{style:{padding:"12px 12px 80px",animation:"fadeIn 0.25s ease"}},

    // 전체 합계 KPI
    h("div",{style:{background:"linear-gradient(135deg,#1a2a6c,#1a3ab0)",borderRadius:12,padding:"16px 20px",marginBottom:14,color:"#fff"}},
      h("div",{style:{fontSize:10,opacity:0.65,letterSpacing:0.5,marginBottom:4}},"62기 전체 신청 현황"),
      h("div",{style:{display:"flex",alignItems:"baseline",gap:6}},
        h("span",{style:{fontFamily:"'Bebas Neue',sans-serif",fontSize:44,lineHeight:1}},totalAll),
        h("span",{style:{fontSize:14,opacity:0.75}},"명")
      ),
      h("div",{style:{display:"flex",gap:12,marginTop:10,flexWrap:"wrap"}},
        CLASS_KEYS.map(k=>{
          const cnt=(classData[k]?.members||[]).length;
          return h("div",{key:k,style:{display:"flex",alignItems:"center",gap:5}},
            h("span",{style:{width:8,height:8,borderRadius:"50%",background:CLASS_COLOR[k],display:"inline-block",flexShrink:0}}),
            h("span",{style:{fontSize:11,opacity:0.85}},k),
            h("span",{style:{fontFamily:"'Bebas Neue',sans-serif",fontSize:16}},cnt),
            h("span",{style:{fontSize:10,opacity:0.6}},"명")
          );
        })
      )
    ),

    // 반별 카드
    CLASS_KEYS.map(classKey=>{
      const cls=classData[classKey];
      const members=cls?.members||[], goals=cls?.goals||{};
      const color=CLASS_COLOR[classKey], total=members.length;
      const totalGoal=Object.values(goals).reduce((a,b)=>a+b,0);
      const stageCounts=STAGE_ORDER.reduce((a,s)=>{a[s]=members.filter(r=>r.stage===s).length;return a},{});

      return h("div",{key:classKey,style:{background:"#fff",borderRadius:12,marginBottom:12,overflow:"hidden",boxShadow:"0 2px 12px rgba(26,58,176,0.07)",borderTop:`3px solid ${color}`}},
        // 반 헤더
        h("div",{style:{padding:"12px 14px 10px",borderBottom:"1px solid rgba(26,58,176,0.08)"}},
          h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center"}},
            h("div",null,
              h("div",{style:{fontSize:13,fontWeight:700,color}},classKey),
              h("div",{style:{fontSize:10,color:"#8899aa",marginTop:2}},cls?.time||"")
            ),
            h("div",{style:{textAlign:"right"}},
              h("div",{style:{fontFamily:"'Bebas Neue',sans-serif",fontSize:28,color,lineHeight:1}},total),
              h("div",{style:{fontSize:10,color:"#8899aa"}},totalGoal>0?`/ ${totalGoal}명 · ${Math.round(total/totalGoal*100)}%`:"명")
            )
          ),
          totalGoal>0&&h("div",{style:{marginTop:8,background:"#f0f4ff",borderRadius:4,height:5,overflow:"hidden"}},
            h("div",{style:{height:"100%",width:`${Math.min(100,Math.round(total/totalGoal*100))}%`,background:color,borderRadius:4}})
          )
        ),
        // 단계별 그리드
        h("div",{style:{display:"grid",gridTemplateColumns:"repeat(5,1fr)"}},
          STAGE_ORDER.map((stage,i)=>{
            const cnt=stageCounts[stage]||0, goal=goals[stage]||0;
            const pct=goal>0?Math.min(100,Math.round(cnt/goal*100)):0;
            const miss=goal-cnt, c=STAGE_COLORS[stage];
            return h("div",{key:stage,style:{padding:"10px 6px",textAlign:"center",borderRight:i<4?"1px solid rgba(26,58,176,0.06)":"none",borderTop:"1px solid rgba(26,58,176,0.06)"}},
              h("div",{style:{fontSize:10,fontWeight:700,color:c,marginBottom:6}},stage),
              h("div",{style:{position:"relative",width:48,height:48,margin:"0 auto 6px"}},
                h("svg",{viewBox:"0 0 36 36",style:{transform:"rotate(-90deg)",width:"100%",height:"100%"}},
                  h("circle",{cx:18,cy:18,r:"15.9",fill:"none",stroke:"#e5e7eb",strokeWidth:"4"}),
                  h("circle",{cx:18,cy:18,r:"15.9",fill:"none",stroke:c,strokeWidth:"4",strokeDasharray:`${pct} ${100-pct}`,strokeLinecap:"round"})
                ),
                h("div",{style:{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}},
                  h("span",{style:{fontFamily:"'Bebas Neue',sans-serif",fontSize:14,color,lineHeight:1}},cnt),
                  goal>0&&h("span",{style:{fontSize:8,color:"#8899aa"}},`/${goal}`)
                )
              ),
              h("div",{style:{fontSize:9,color:"#8899aa"}},goal>0?`${pct}%`:"—"),
              goal>0&&miss>0&&h("div",{style:{fontSize:9,color:"#c62828",fontWeight:700,marginTop:2}},`-${miss}`),
              goal>0&&miss===0&&h("div",{style:{fontSize:9,color:"#2e7d32",fontWeight:700,marginTop:2}},"✓")
            );
          })
        )
      );
    })
  );
}

// ══════════════════════════════════════════
//  반별 패널
// ══════════════════════════════════════════
function ClassPanel({classKey,cls}){
  const members=cls?.members||[], goals=cls?.goals||{}, missing=cls?.missing||{};
  const color=CLASS_COLOR[classKey];
  const totalGoal=Object.values(goals).reduce((a,b)=>a+b,0);

  const [subTab,  setSubTab]  = useState("dashboard");
  const [stageF,  setStageF]  = useState("전체");
  const [search,  setSearch]  = useState("");
  const [sortKey, setSortKey] = useState("timestamp");
  const [detail,  setDetail]  = useState(null);
  const [toast,   setToast]   = useState("");
  const showToast=msg=>{setToast(msg);setTimeout(()=>setToast(""),2000)};

  const stageCounts=STAGE_ORDER.reduce((a,s)=>{a[s]=members.filter(r=>r.stage===s).length;return a},{});
  const total=members.length;
  const male=members.filter(r=>r.gender==="남").length;
  const female=members.filter(r=>r.gender==="여").length;

  const districtCounts={};
  members.forEach(r=>{const k=exDistrict(r.district);districtCounts[k]=(districtCounts[k]||0)+1});

  const filtered=members
    .filter(r=>stageF==="전체"||r.stage===stageF)
    .filter(r=>!search||r.name.includes(search)||(r.district||"").includes(search)||(r.pos||"").includes(search))
    .sort((a,b)=>{
      if(sortKey==="timestamp")return parseTs(b.timestamp)-parseTs(a.timestamp);
      if(sortKey==="stage")    return STAGE_ORDER.indexOf(a.stage)-STAGE_ORDER.indexOf(b.stage);
      if(sortKey==="name")     return a.name.localeCompare(b.name,"ko");
      return 0;
    });

  const recent5=[...members].sort((a,b)=>parseTs(b.timestamp)-parseTs(a.timestamp)).slice(0,5);
  const hasMissing=STAGE_ORDER.some(s=>(missing[s]||[]).length>0||(goals[s]-(stageCounts[s]||0))>0);

  if(total===0&&!hasMissing)return h("div",{style:{padding:"40px 24px",textAlign:"center",animation:"fadeIn 0.25s ease"}},
    h("div",{style:{fontSize:48,marginBottom:16}},"📭"),
    h("div",{style:{fontSize:15,fontWeight:700,marginBottom:8}},classKey),
    h("div",{style:{fontSize:13,color:"#8899aa"}},cls?.time||""),
    h("div",{style:{fontSize:12,color:"#aab0c0",marginTop:16}},"아직 신청자가 없습니다")
  );

  // 서브탭 렌더
  const renderDashboard=()=>{
    if(total===0)return h("div",{style:{textAlign:"center",padding:"40px 20px"}},
      h("div",{style:{fontSize:40,marginBottom:10}},"📭"),
      h("div",{style:{fontSize:13,color:"#8899aa"}},"신청자가 없습니다")
    );
    return h(Fragment,null,
      // KPI
      h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:12}},
        [{lbl:"총 신청자",val:total,sub:totalGoal>0?`목표 ${totalGoal}명`:"목표 미설정",c:color},
         {lbl:"신청률",val:totalGoal>0?`${Math.round(total/totalGoal*100)}%`:"—",sub:`${total}/${totalGoal}`,c:"#2e7d32"},
         {lbl:"남성",val:male,sub:`${total>0?Math.round(male/total*100):0}%`,c:"#1565c0"},
         {lbl:"여성",val:female,sub:`${total>0?Math.round(female/total*100):0}%`,c:"#9c27b0"},
        ].map((c,i)=>h("div",{key:i,style:{background:"#fff",borderRadius:10,padding:"14px 16px",boxShadow:"0 2px 10px rgba(26,58,176,0.07)",borderTop:`3px solid ${c.c}`}},
          h("div",{style:{fontSize:9,fontWeight:700,color:"#8899aa",letterSpacing:0.5,marginBottom:6}},c.lbl),
          h("div",{style:{fontFamily:"'Bebas Neue',sans-serif",fontSize:30,letterSpacing:1,color:c.c,lineHeight:1}},c.val),
          h("div",{style:{fontSize:10,color:"#8899aa",marginTop:4}},c.sub)
        ))
      ),
      // 단계별
      h("div",{style:sec},
        h("div",{style:secT(color)},"단계별 신청 현황"),
        h("div",{style:{padding:"14px 16px",display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:8}},
          STAGE_ORDER.map(st=>{
            const cnt=stageCounts[st]||0,goal=goals[st]||0;
            const pct=goal>0?Math.min(100,Math.round(cnt/goal*100)):0,c=STAGE_COLORS[st];
            return h("div",{key:st,style:{textAlign:"center"}},
              h("div",{style:{fontSize:11,fontWeight:700,color:c,marginBottom:8}},st),
              h("div",{style:{position:"relative",width:60,height:60,margin:"0 auto 8px"}},
                h("svg",{viewBox:"0 0 36 36",style:{transform:"rotate(-90deg)",width:"100%",height:"100%"}},
                  h("circle",{cx:18,cy:18,r:"15.9",fill:"none",stroke:"#e5e7eb",strokeWidth:"3.5"}),
                  h("circle",{cx:18,cy:18,r:"15.9",fill:"none",stroke:c,strokeWidth:"3.5",strokeDasharray:`${pct} ${100-pct}`,strokeLinecap:"round"})
                ),
                h("div",{style:{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}},
                  h("span",{style:{fontFamily:"'Bebas Neue',sans-serif",fontSize:17,color:c,lineHeight:1}},cnt),
                  h("span",{style:{fontSize:9,color:"#8899aa"}},`/${goal}`)
                )
              ),
              h("div",{style:{background:"#f0f4ff",borderRadius:4,height:4,overflow:"hidden"}},
                h("div",{style:{height:"100%",width:`${pct}%`,background:c,borderRadius:4}})
              ),
              h("div",{style:{fontSize:10,color:"#8899aa",marginTop:3}},`${pct}%`),
              goal>0&&goal-cnt>0&&h("div",{style:{fontSize:10,color:"#c62828",fontWeight:700}},`-${goal-cnt}명`)
            );
          })
        )
      ),
      // 최근 신청
      h("div",{style:sec},
        h("div",{style:secT(color)},"최근 신청"),
        recent5.map((r,i)=>h("div",{key:i,onClick:()=>setDetail(r),style:{display:"flex",alignItems:"center",padding:"10px 14px",borderBottom:"1px solid rgba(26,58,176,0.05)",cursor:"pointer"}},
          h("div",{style:{width:30,height:30,borderRadius:6,background:r.gender==="남"?"linear-gradient(135deg,#2050c8,#1a3a9e)":"linear-gradient(135deg,#9c27b0,#7b1fa2)",color:"#fff",fontSize:14,display:"flex",alignItems:"center",justifyContent:"center",marginRight:10,flexShrink:0}},r.gender==="남"?"👨":"👩"),
          h("div",{style:{flex:1,minWidth:0}},
            h("div",{style:{fontSize:13,fontWeight:700}},r.name,h("span",{style:{fontSize:10,color:"#8899aa",fontWeight:400,marginLeft:5}},r.pos)),
            h("div",{style:{fontSize:10,color:"#4a5568",marginTop:2,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}},r.district)
          ),
          h("span",{style:{background:STAGE_COLORS[r.stage]+"22",color:STAGE_COLORS[r.stage],fontSize:10,fontWeight:700,padding:"2px 7px",borderRadius:4,flexShrink:0}},r.stage)
        ))
      ),
      // 지구별 3열
      Object.keys(districtCounts).length>0&&h("div",{style:sec},
        h("div",{style:secT(color)},"지구별 신청 현황"),
        h("div",{style:{padding:"10px 12px",display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8}},
          Object.entries(districtCounts).sort((a,b)=>b[1]-a[1]).map(([d,cnt],i)=>{
            const pal=[color,"#2e7d32","#f57f17","#9c27b0","#e65100","#1565c0","#0097a7","#c62828","#5d4037"];
            const c=pal[i%pal.length],pct=Math.round(cnt/total*100);
            return h("div",{key:d,style:{background:"#f7f9ff",borderRadius:8,padding:"10px 10px 8px",border:`1px solid ${c}22`,textAlign:"center"}},
              h("div",{style:{display:"inline-block",width:8,height:8,borderRadius:"50%",background:c,marginBottom:5}}),
              h("div",{style:{fontSize:11,fontWeight:700,color:"#1a1f2e",marginBottom:4,wordBreak:"keep-all",lineHeight:1.3}},d),
              h("div",{style:{fontFamily:"'Bebas Neue',sans-serif",fontSize:22,color,lineHeight:1}},cnt),
              h("div",{style:{fontSize:9,color:"#8899aa",marginTop:2}},`명 · ${pct}%`),
              h("div",{style:{background:"#e5e7eb",borderRadius:3,height:3,overflow:"hidden",marginTop:6}},
                h("div",{style:{height:"100%",width:`${pct}%`,background:c,borderRadius:3}})
              )
            );
          })
        )
      )
    );
  };

  const renderList=()=>{
    if(total===0)return h("div",{style:{textAlign:"center",padding:"40px 20px"}},
      h("div",{style:{fontSize:40,marginBottom:10}},"📭"),
      h("div",{style:{fontSize:13,color:"#8899aa"}},"신청자가 없습니다")
    );
    return h(Fragment,null,
      h("div",{style:{background:"#fff",borderRadius:10,padding:"8px 10px",marginBottom:8,display:"flex",gap:6,overflowX:"auto",boxShadow:"0 2px 8px rgba(26,58,176,0.06)"}},
        ["전체",...STAGE_ORDER].map(s=>h("button",{key:s,onClick:()=>setStageF(s),style:{flexShrink:0,padding:"5px 12px",background:stageF===s?color:"#f0f4ff",border:`1px solid ${stageF===s?color:"rgba(26,58,176,0.12)"}`,borderRadius:6,fontSize:11,fontWeight:700,color:stageF===s?"#fff":color,cursor:"pointer"}},s))
      ),
      h("div",{style:{background:"#fff",borderRadius:10,padding:"7px 12px",marginBottom:8,display:"flex",alignItems:"center",gap:8,boxShadow:"0 2px 8px rgba(26,58,176,0.06)"}},
        h("span",{style:{fontSize:13,color:"#8899aa"}},"🔍"),
        h("input",{value:search,onChange:e=>setSearch(e.target.value),placeholder:"이름, 목장, 직분 검색…",style:{flex:1,border:"none",background:"transparent",fontSize:13,outline:"none"}}),
        search&&h("span",{onClick:()=>setSearch(""),style:{fontSize:12,color:"#8899aa",cursor:"pointer"}},"✕")
      ),
      h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8,paddingInline:2}},
        h("span",{style:{fontSize:10,color:"#8899aa"}},h("strong",{style:{color}},filtered.length),"명 표시 (전체 ",total,"명)"),
        h("select",{value:sortKey,onChange:e=>setSortKey(e.target.value),style:{background:"#f0f4ff",border:"1px solid rgba(26,58,176,0.12)",borderRadius:6,padding:"4px 8px",fontSize:10,fontWeight:700,color,outline:"none"}},
          h("option",{value:"timestamp"},"최신순"),
          h("option",{value:"stage"},"단계순"),
          h("option",{value:"name"},"이름순")
        )
      ),
      filtered.length===0
        ? h("div",{style:{textAlign:"center",padding:"40px 20px"}},h("div",{style:{fontSize:36,marginBottom:10}},"🔍"),h("div",{style:{fontSize:13,color:"#8899aa"}},"검색 결과가 없습니다"))
        : filtered.map((r,i)=>h("div",{key:i,style:card,onClick:()=>setDetail(r)},
            h("div",{style:{display:"flex",alignItems:"center",padding:"10px 12px",gap:10}},
              h("div",{style:{width:30,height:30,borderRadius:6,background:`linear-gradient(135deg,${color},${color}bb)`,color:"#fff",fontSize:11,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}},filtered.length-i),
              h("div",{style:{flex:1,minWidth:0}},
                h("div",{style:{fontSize:13,fontWeight:700,display:"flex",alignItems:"center",gap:5}},r.name,h("span",{style:{fontSize:10,color:"#8899aa",fontWeight:400}},r.gender)),
                h("div",{style:{fontSize:10,color:"#4a5568",marginTop:2,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}},r.pos," · ",r.district),
                h("div",{style:{display:"flex",gap:4,marginTop:4,flexWrap:"wrap"}},
                  h("span",{style:{background:CLASS_BG[classKey],color,fontSize:10,padding:"2px 6px",borderRadius:4,fontWeight:700}},exDistrict(r.district)),
                  h("span",{style:{background:STAGE_COLORS[r.stage]+"22",color:STAGE_COLORS[r.stage],fontSize:10,padding:"2px 6px",borderRadius:4,fontWeight:700}},r.stage)
                )
              ),
              h("span",{style:{fontSize:14,color:"#8899aa"}},"›")
            )
          ))
    );
  };

  const renderMissing=()=>{
    if(!hasMissing)return h("div",{style:{textAlign:"center",padding:"40px 20px"}},
      h("div",{style:{fontSize:40,marginBottom:10}},"✅"),
      h("div",{style:{fontSize:13,color:"#2e7d32",fontWeight:700}},"미신청자 없음")
    );
    return h(Fragment,null,
      h("div",{style:{background:"#fdecea",border:"1px solid rgba(198,40,40,0.2)",borderRadius:10,padding:14,marginBottom:12,display:"flex",gap:10}},
        h("span",{style:{fontSize:20}},"⚠️"),
        h("div",null,
          h("div",{style:{fontWeight:700,color:"#c62828",fontSize:13,marginBottom:3}},"미신청자 알림"),
          h("div",{style:{fontSize:12,color:"#4a5568"}},"61기 수료자 중 62기를 신청하지 않은 훈련생입니다. 개별 연락이 필요합니다.")
        )
      ),
      STAGE_ORDER.map(stage=>{
        const nm=missing[stage]||[],goal=goals[stage]||0,cur=stageCounts[stage]||0;
        const miss=goal-cur,c=STAGE_COLORS[stage];
        if(miss<=0)return null;
        return h("div",{key:stage,style:{...sec,border:`1px solid ${c}33`}},
          h("div",{style:{...secT(c),background:`${c}11`,borderColor:`${c}22`,display:"flex",justifyContent:"space-between"}},
            h("span",null,`${stage} (${cur}/${goal}명 신청)`),
            h("span",{style:{background:"#fdecea",color:"#c62828",fontSize:10,fontWeight:700,padding:"2px 8px",borderRadius:4}},`미신청 ${miss}명`)
          ),
          h("div",{style:{padding:"4px 0"}},
            nm.map((n,i)=>h("div",{key:i,style:{display:"flex",alignItems:"center",padding:"9px 14px",borderBottom:"1px solid rgba(26,58,176,0.05)"}},
              h("div",{style:{width:26,height:26,borderRadius:6,background:"linear-gradient(135deg,#e03030,#b01010)",color:"#fff",fontSize:10,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",marginRight:10,flexShrink:0}},i+1),
              h("div",{style:{flex:1}},
                h("div",{style:{fontSize:13,fontWeight:700}},n),
                h("div",{style:{fontSize:10,color:"#8899aa",marginTop:2}},`연락 필요 · ${stage} 미신청`)
              ),
              h("span",{style:{fontSize:10,color:"#c62828",fontWeight:700,background:"#fdecea",padding:"2px 8px",borderRadius:4}},"연락필요")
            )),
            miss>nm.length&&h("div",{style:{fontSize:11,color:"#8899aa",textAlign:"center",padding:10}},`+${miss-nm.length}명 추가 확인 필요`)
          )
        );
      }),
      h("div",{style:sec},
        h("div",{style:secT(color)},"미신청 현황 요약"),
        h("div",{style:{display:"grid",gridTemplateColumns:"repeat(5,1fr)"}},
          STAGE_ORDER.map(stage=>{
            const goal=goals[stage]||0,cur=stageCounts[stage]||0,miss=goal-cur;
            return h("div",{key:stage,style:{textAlign:"center",padding:"12px 6px",borderRight:"1px solid rgba(26,58,176,0.07)"}},
              h("div",{style:{fontSize:10,color:"#8899aa",marginBottom:5}},stage),
              h("div",{style:{fontFamily:"'Bebas Neue',sans-serif",fontSize:24,color:miss>0?"#c62828":"#2e7d32"}},miss>0?`-${miss}`:goal===0?"—":"✓"),
              h("div",{style:{fontSize:10,color:"#8899aa",marginTop:2}},`${cur}/${goal}명`)
            );
          })
        )
      )
    );
  };

  return h("div",null,
    // 서브 탭
    h("div",{style:{background:"#fff",borderBottom:"1px solid rgba(26,58,176,0.1)",display:"flex",position:"sticky",top:94,zIndex:80}},
      [{k:"dashboard",ico:"📊",lbl:"대시보드"},{k:"list",ico:"📋",lbl:"명단"},{k:"missing",ico:"⚠️",lbl:"미신청자"}].map(t=>
        h("div",{key:t.k,onClick:()=>setSubTab(t.k),style:{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:2,cursor:"pointer",padding:"9px 6px",borderBottom:subTab===t.k?`3px solid ${color}`:"3px solid transparent",marginBottom:-1}},
          h("span",{style:{fontSize:15}},t.ico),
          h("span",{style:{fontSize:10,fontWeight:700,color:subTab===t.k?color:"#8899aa",whiteSpace:"nowrap"}},t.lbl)
        )
      )
    ),
    h("div",{style:{padding:"12px 12px 80px",animation:"fadeIn 0.2s ease"}},
      subTab==="dashboard"&&renderDashboard(),
      subTab==="list"&&renderList(),
      subTab==="missing"&&renderMissing()
    ),
    detail&&h(DetailSheet,{member:detail,onClose:()=>setDetail(null)}),
    h(Toast,{msg:toast})
  );
}

// ══════════════════════════════════════════
//  메인 App
// ══════════════════════════════════════════
function App(){
  const [user,      setUser]      = useState(null);
  const [activeTab, setActiveTab] = useState("overall");
  const [classData, setClassData] = useState({});
  const [loading,   setLoading]   = useState(false);
  const [error,     setError]     = useState("");
  const [lastSync,  setLastSync]  = useState(null);

  const fetchData=useCallback(async()=>{
    setLoading(true); setError("");
    try{
      const res=await fetch(`${GAS_URL}?action=getData`);
      if(!res.ok)throw new Error(`HTTP ${res.status}`);
      const json=await res.json();
      if(json.error)throw new Error(json.error);
      setClassData(json);
      setLastSync(new Date());
    }catch(e){
      setError(e.message||"데이터 로딩 실패");
    }finally{setLoading(false)}
  },[]);

  useEffect(()=>{if(user)fetchData()},[user]);

  const handleLogin=u=>{setUser(u);setActiveTab("overall")};

  if(!user)return h(LoginScreen,{onLogin:handleLogin});

  const visibleClasses=user.role==="full"?CLASS_KEYS:[user.classKey].filter(Boolean);
  const totalAll=CLASS_KEYS.reduce((s,k)=>s+(classData[k]?.members?.length||0),0);
  const tabs=[
    {key:"overall",lbl:"전체",ico:"🗂"},
    ...visibleClasses.map(k=>({key:k,lbl:k.replace("반",""),ico:"📌"})),
  ];

  return h("div",{style:{fontFamily:"'Noto Sans KR',sans-serif",background:"#f0f3f8",minHeight:"100vh"}},

    // 헤더
    h("div",{style:{background:"linear-gradient(135deg,#1a2a6c,#1a3ab0)",color:"#fff",position:"sticky",top:0,zIndex:200,boxShadow:"0 2px 12px rgba(26,42,108,0.3)"}},
      h("div",{style:{padding:"8px 14px",minHeight:48,display:"flex",alignItems:"center",justifyContent:"space-between"}},
        h("div",null,
          h("div",{style:{fontFamily:"'Bebas Neue',sans-serif",fontSize:14,letterSpacing:1.5}},"JUST EE · 제62기 전도폭발"),
          h("div",{style:{fontSize:9,opacity:0.5,marginTop:1}},`전체 ${totalAll}명`,lastSync&&` · ${lastSync.toLocaleTimeString("ko-KR")} 동기화`)
        ),
        h("div",{style:{display:"flex",alignItems:"center",gap:6}},
          h("button",{onClick:fetchData,disabled:loading,style:{fontSize:10,background:"rgba(255,255,255,0.12)",border:"1px solid rgba(255,255,255,0.25)",borderRadius:6,padding:"3px 8px",cursor:loading?"not-allowed":"pointer",color:"#fff",display:"flex",alignItems:"center",gap:3}},
            h("span",{style:{display:"inline-block",animation:loading?"spin 0.8s linear infinite":"none"}},"↻"),
            loading?"로딩중":"새로고침"
          ),
          h("span",{style:{fontSize:9,color:"rgba(255,255,255,0.65)",maxWidth:60,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},user.name),
          h("button",{onClick:()=>{setUser(null);setClassData({});setLastSync(null)},style:{fontSize:10,background:"rgba(255,255,255,0.12)",border:"1px solid rgba(255,255,255,0.25)",borderRadius:6,padding:"3px 8px",cursor:"pointer",color:"#fff"}},"로그아웃")
        )
      ),
      // 탭 바
      h("div",{style:{display:"flex",borderTop:"1px solid rgba(255,255,255,0.1)",overflowX:"auto"}},
        tabs.map(t=>{
          const active=activeTab===t.key;
          const cnt=t.key==="overall"?totalAll:(classData[t.key]?.members||[]).length;
          return h("div",{key:t.key,onClick:()=>setActiveTab(t.key),style:{flex:"0 0 auto",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"8px 18px",cursor:"pointer",borderBottom:active?"3px solid #fff":"3px solid transparent",background:active?"rgba(255,255,255,0.12)":"transparent",transition:"all 0.15s"}},
            h("div",{style:{fontSize:10,fontWeight:700,whiteSpace:"nowrap",letterSpacing:0.3,color:active?"#fff":"rgba(255,255,255,0.55)"}},`${t.ico} ${t.lbl}`),
            h("div",{style:{fontFamily:"'Bebas Neue',sans-serif",fontSize:13,color:active?"#fff":"rgba(255,255,255,0.4)",marginTop:2}},`${cnt}명`)
          );
        })
      )
    ),

    // 오류 배너
    error&&h("div",{style:{background:"#fdecea",borderBottom:"1px solid rgba(198,40,40,0.2)",padding:"10px 16px",display:"flex",alignItems:"center",gap:8}},
      h("span",null,"⚠️"),
      h("span",{style:{fontSize:12,color:"#c62828",flex:1}},error),
      h("button",{onClick:fetchData,style:{fontSize:11,color:"#c62828",background:"none",border:"1px solid #c62828",borderRadius:5,padding:"3px 8px",cursor:"pointer"}},"재시도")
    ),

    // 콘텐츠
    loading&&Object.keys(classData).length===0
      ? h("div",{style:{padding:"40px 24px",textAlign:"center"}},
          h("div",{style:{fontSize:32,marginBottom:12,display:"inline-block",animation:"spin 1s linear infinite"}},"↻"),
          h("div",{style:{fontSize:13,color:"#8899aa"}},"구글시트에서 데이터를 불러오는 중...")
        )
      : activeTab==="overall"
          ? h(OverallPanel,{classData})
          : h(ClassPanel,{key:activeTab,classKey:activeTab,cls:classData[activeTab]})
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(h(App,null));
</script>
</body>
</html>
